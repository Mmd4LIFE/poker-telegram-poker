<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Poker CM</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <div id="splash" class="splash">
      <div class="splash-logo">♠️♥️♦️♣️</div>
      <div class="splash-title">POKER CM</div>
      <div class="splash-sub">Texas Hold'em</div>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Bottom navigation -->
  <nav id="tabbar" class="tabbar hidden">
    <button class="tab" data-view="lobby"><span>🎮</span><small>Play</small></button>
    <button class="tab" data-view="quests"><span>🎯</span><small>Quests</small></button>
    <button class="tab" data-view="shop"><span>💰</span><small>Shop</small></button>
    <button class="tab" data-view="leaderboard"><span>🏆</span><small>Ranks</small></button>
    <button class="tab" data-view="profile"><span>👤</span><small>Me</small></button>
  </nav>

  <div id="toast" class="toast hidden"></div>

  <script src="js/cards.js"></script>
  <script src="js/api.js"></script>
  <script src="js/table.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
