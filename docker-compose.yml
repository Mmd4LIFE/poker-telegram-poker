services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-poker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-poker_secret}
      POSTGRES_DB: ${POSTGRES_DB:-poker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poker} -d ${POSTGRES_DB:-poker}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pokernet

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    # entrypoint runs alembic upgrade + seed, then launches uvicorn (with the bot)
    command: ["/app/entrypoint.sh"]
    expose:
      - "8000"
    networks:
      - pokernet

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    # bound to localhost only; Cloudflare Tunnel (or a host proxy) reaches it.
    # Override the published port with WEB_PORT in .env if 8080 is taken.
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # New Next.js static export served at the root (replaces the old app)
      - ./webout:/usr/share/nginx/html:ro
    networks:
      - pokernet

volumes:
  pgdata:

networks:
  pokernet:
    driver: bridge
