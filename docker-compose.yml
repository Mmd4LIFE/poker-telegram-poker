services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-poker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-poker_secret}
      POSTGRES_DB: ${POSTGRES_DB:-poker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poker} -d ${POSTGRES_DB:-poker}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pokernet

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - pokernet

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # entrypoint runs alembic upgrade + seed, then launches uvicorn (with the bot)
    command: ["/app/entrypoint.sh"]
    expose:
      - "8000"
    networks:
      - pokernet

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./miniapp:/usr/share/nginx/html:ro
    networks:
      - pokernet

volumes:
  pgdata:
  redisdata:

networks:
  pokernet:
    driver: bridge
