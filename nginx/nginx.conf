server {
    listen 80;
    server_name _;

    # The new Next.js static export is mounted here (replaces the old app).
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 4m;

    # --- REST API ----------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Telegram webhook (only used in webhook mode) ----------------------
    location /webhook/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- WebSocket real-time game feed ------------------------------------
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Legacy /app path still serves the same app (old cached links) -----
    location ^~ /app/ {
        try_files $uri /index.html;
        add_header Cache-Control "no-store" always;
    }
    location = /app { return 308 /; }

    # --- Never cache the app shell / scripts (instant updates) -------------
    location ~* \.(?:js|mjs|css|html)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # --- Mini App (Next.js SPA) at the root -------------------------------
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}
