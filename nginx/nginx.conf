server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 4m;

    # --- Mini App static assets -------------------------------------------
    # Never cache the app shell / scripts so updates propagate instantly
    # (Telegram's WebView and Cloudflare both honour no-store).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location ~* \.(?:js|mjs|css|html)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # --- Next.js + shadcn preview (static export) at /app -------------------
    # ^~ makes this win over the js/css regex above for /app assets.
    location = /app { return 308 /app/; }
    location ^~ /app/ {
        alias /usr/share/nginx/webapp/;
        try_files $uri $uri/ /app/index.html;
        add_header Cache-Control "no-store" always;
    }

    # --- REST API ----------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Telegram webhook (only used in webhook mode) ----------------------
    location /webhook/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- WebSocket real-time game feed ------------------------------------
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
